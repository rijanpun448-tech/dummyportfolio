<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicken Road FINAL AAA 🐔🔥</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial;
  color: white;
  text-align: center;
}

canvas {
  display: block;
  margin: auto;
  background: #1a1a1a;
}

/* UI */
#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 14px;
  text-align: left;
}

/* D-PAD CONTROLS (NUM STYLE) */
#pad {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 140px;
  height: 140px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.btn {
  background: rgba(255,204,0,0.9);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  user-select: none;
}
</style>
</head>

<body>

<div id="ui">
🐔 Score: <span id="score">0</span><br>
🏆 Best: <span id="best">0</span><br>
❤️ Lives: <span id="lives">3</span><br>
⚡ Level: <span id="level">1</span>
</div>

<canvas id="game" width="360" height="600"></canvas>

<!-- NUM PAD CONTROLS -->
<div id="pad">
  <div></div>
  <div class="btn" onclick="move('up')">⬆️</div>
  <div></div>

  <div class="btn" onclick="move('left')">⬅️</div>
  <div class="btn" style="background:#444;color:#fff;">●</div>
  <div class="btn" onclick="move('right')">➡️</div>

  <div></div>
  <div class="btn" onclick="move('down')">⬇️</div>
  <div></div>
</div>

<audio id="hit" src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"></audio>
<audio id="move" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const hit = document.getElementById("hit");
const moveSound = document.getElementById("move");

let score = 0;
let lives = 3;
let level = 1;
let best = localStorage.getItem("best") || 0;

/* 🐔 animation */
const frames = [
  "https://cdn-icons-png.flaticon.com/512/616/616408.png",
  "https://cdn-icons-png.flaticon.com/512/616/616430.png",
  "https://cdn-icons-png.flaticon.com/512/616/616494.png"
];

let imgs = frames.map(s=>{let i=new Image(); i.src=s; return i;});
let f=0,t=0;

/* 🚗 car */
const carImg = new Image();
carImg.src = "https://cdn-icons-png.flaticon.com/512/741/741407.png";

let chicken = {x:160,y:550,s:40};
let cars = [];
let particles = [];

let shake=0;

/* spawn */
function spawn(){
  let lanes=[60,120,180,240,300,360,420,480];
  let count = 1 + Math.floor(level/2);

  for(let i=0;i<count;i++){
    cars.push({
      x:Math.random()>0.5?-60:360,
      y:lanes[Math.floor(Math.random()*lanes.length)],
      w:50,
      h:35,
      sp:(2+level*0.2)*(Math.random()>0.5?1:-1)
    });
  }
}

/* draw chicken */
function drawChicken(){
  t++;
  if(t%6===0) f=(f+1)%imgs.length;
  ctx.drawImage(imgs[f],chicken.x,chicken.y,chicken.s,chicken.s);
}

/* cars */
function drawCars(){
  cars.forEach(c=>{
    ctx.drawImage(carImg,c.x,c.y,c.w,c.h);
  });
}

/* move */
function moveCars(){
  cars.forEach(c=>c.x+=c.sp);
  cars=cars.filter(c=>c.x>-120 && c.x<420);
}

/* particles */
function boom(x,y){
  for(let i=0;i<15;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:20
    });
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle="orange";
    ctx.fillRect(p.x,p.y,3,3);
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);
}

/* collision */
function check(){
  for(let c of cars){
    if(
      chicken.x<c.x+c.w &&
      chicken.x+chicken.s>c.x &&
      chicken.y<c.y+c.h &&
      chicken.y+chicken.s>c.y
    ){
      hit.play();
      lives--;
      shake=10;
      boom(chicken.x,chicken.y);

      chicken.x=160;
      chicken.y=550;

      if(lives<=0){
        if(score>best) localStorage.setItem("best",score);
        alert("💀 GAME OVER\nScore: "+score);
        location.reload();
      }
    }
  }
}

/* road */
function road(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,360,600);

  ctx.strokeStyle="#ffffff20";
  ctx.setLineDash([15,15]);

  for(let i=0;i<10;i++){
    ctx.beginPath();
    ctx.moveTo(0,i*60);
    ctx.lineTo(360,i*60);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

/* move */
function move(dir){
  moveSound.play();

  if(dir==="up"){ chicken.y-=30; score++; }
  if(dir==="down") chicken.y+=30;
  if(dir==="left") chicken.x-=30;
  if(dir==="right") chicken.x+=30;

  level = 1 + Math.floor(score/10);
}

/* shake */
function applyShake(){
  if(shake>0){
    let dx=(Math.random()-0.5)*shake;
    let dy=(Math.random()-0.5)*shake;
    ctx.translate(dx,dy);
    shake*=0.9;
  }
}

/* loop */
function loop(){
  ctx.setTransform(1,0,0,1,0,0);
  applyShake();

  ctx.clearRect(0,0,360,600);

  road();
  drawCars();
  drawChicken();
  drawParticles();

  moveCars();
  check();

  document.getElementById("score").innerText=score;
  document.getElementById("lives").innerText=lives;
  document.getElementById("best").innerText=best;
  document.getElementById("level").innerText=level;

  requestAnimationFrame(loop);
}

setInterval(spawn, 900);
loop();

/* swipe */
let sx,sy;

canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?"right":"left");
  }else{
    move(dy>0?"down":"up");
  }
});

/* keyboard */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp")move("up");
  if(e.key==="ArrowDown")move("down");
  if(e.key==="ArrowLeft")move("left");
  if(e.key==="ArrowRight")move("right");
});
</script>

</body>
</html>
