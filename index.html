```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PUBG Aim Trainer 🔫</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("https://images.unsplash.com/photo-1605902711622-cfb43c4437d1") no-repeat center/cover;
    color: #fff;
    text-align: center;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
  }

  h1 {
    margin-top: 20px;
    font-size: 32px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #000;
  }

  #score {
    font-size: 22px;
    margin: 10px;
  }

  #timer {
    font-size: 18px;
  }

  #gameArea {
    position: relative;
    width: 100vw;
    height: 80vh;
  }

  #target {
    width: 70px;
    height: 70px;
    position: absolute;
    cursor: pointer;
    background: url("https://cdn-icons-png.flaticon.com/512/684/684908.png") no-repeat center/contain;
    transition: transform 0.1s;
  }

  #target:active {
    transform: scale(0.7);
  }

  #startBtn {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #ffb300;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  #startBtn:hover {
    background: #ffaa00;
  }
</style>
</head>

<body>

<h1>🔫 PUBG Aim Trainer</h1>
<div id="score">Kills: 0</div>
<div id="timer">Time: 15</div>
<button id="startBtn">Start Match</button>

<div id="gameArea">
  <div id="target"></div>
</div>

<!-- 🔊 Gun Sound -->
<audio id="gunSound" src="https://www.soundjay.com/mechanical/sounds/gun-shot-1.mp3"></audio>

<script>
  const target = document.getElementById("target");
  const scoreDisplay = document.getElementById("score");
  const timerDisplay = document.getElementById("timer");
  const startBtn = document.getElementById("startBtn");
  const gunSound = document.getElementById("gunSound");

  let score = 0;
  let timeLeft = 15;
  let moveInterval, timerInterval;

  function moveTarget() {
    const x = Math.random() * (window.innerWidth - 80);
    const y = Math.random() * (window.innerHeight - 180);
    target.style.left = x + "px";
    target.style.top = y + "px";
  }

  target.addEventListener("click", () => {
    score++;
    scoreDisplay.textContent = "Kills: " + score;

    // 🔊 play gun sound
    gunSound.currentTime = 0;
    gunSound.play();

    moveTarget();
  });

  startBtn.addEventListener("click", () => {
    score = 0;
    timeLeft = 15;

    scoreDisplay.textContent = "Kills: 0";
    timerDisplay.textContent = "Time: 15";

    moveTarget();

    clearInterval(moveInterval);
    clearInterval(timerInterval);

    moveInterval = setInterval(moveTarget, 800);

    timerInterval = setInterval(() => {
      timeLeft--;
      timerDisplay.textContent = "Time: " + timeLeft;

      if (timeLeft <= 0) {
        clearInterval(moveInterval);
        clearInterval(timerInterval);
        alert("Match Over! Total Kills: " + score);
      }
    }, 1000);
  });
</script>

</body>
</html>
```
