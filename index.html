<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime World 🌸</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #0f0f1a, #1a1a2e);
  color: white;
  overflow-x: hidden;
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

/* Navbar */
nav {
  position: fixed;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  text-align: center;
  backdrop-filter: blur(10px);
}

nav a {
  color: #ff77ff;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: white;
}

/* Hero section */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero img {
  width: 250px;
  border-radius: 20px;
  animation: float 4s ease-in-out infinite;
  box-shadow: 0 0 30px #ff77ff;
}

.hero h1 {
  font-size: 3rem;
  margin-top: 20px;
}

.hero p {
  opacity: 0.8;
}

/* Gallery */
.gallery {
  padding: 50px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: #1f1f3a;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff77ff;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: #0f0f1a;
}
</style>

</head>

<body>

<nav>
  <a href="#">Home</a>
  <a href="#gallery">Gallery</a>
</nav>

<section class="hero">
  <!-- Replace this image with your anime image -->
  <img src="https://i.imgur.com/3ZQ3Z4H.png" alt="Anime Girl">
  <h1>Welcome to Anime World 🌸</h1>
  <p>Feel the vibes of anime aesthetics ✨</p>
</section>

<section id="gallery" class="gallery">
  <div class="card">
    <img src="https://i.imgur.com/qIufhof.png">
  </div>
  <div class="card">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
  </div>
  <div class="card">
    <img src="https://i.imgur.com/JlUvsxa.jpg">
  </div>
  <div class="card">
    <img src="https://i.imgur.com/5tj6S7Ol.jpg">
  </div>
</section>

<footer>
  <p>Made with ❤️ in Anime Style</p>
</footer>

</body>
</html>
