```html id="chickenroad"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicken Road 🐔</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #222;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  h1 {
    margin: 10px;
  }

  canvas {
    background: #444;
    display: block;
    margin: auto;
    border: 3px solid white;
  }
</style>
</head>

<body>

<h1>🐔 Chicken Road Crossing</h1>
<p>Use Arrow Keys ↑ ↓ ← →</p>
<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let chicken = {
  x: 180,
  y: 550,
  size: 30,
  speed: 20
};

let cars = [];
let score = 0;

function createCar() {
  let laneY = Math.floor(Math.random() * 10) * 60;
  cars.push({
    x: Math.random() > 0.5 ? -50 : 400,
    y: laneY,
    width: 50,
    height: 30,
    speed: (Math.random() * 3 + 2) * (Math.random() > 0.5 ? 1 : -1)
  });
}

function drawChicken() {
  ctx.fillStyle = "yellow";
  ctx.fillRect(chicken.x, chicken.y, chicken.size, chicken.size);
}

function drawCars() {
  ctx.fillStyle = "red";
  cars.forEach(car => {
    ctx.fillRect(car.x, car.y, car.width, car.height);
  });
}

function moveCars() {
  cars.forEach(car => {
    car.x += car.speed;
  });

  cars = cars.filter(car => car.x > -60 && car.x < 460);
}

function checkCollision() {
  for (let car of cars) {
    if (
      chicken.x < car.x + car.width &&
      chicken.x + chicken.size > car.x &&
      chicken.y < car.y + car.height &&
      chicken.y + chicken.size > car.y
    ) {
      alert("💀 Game Over! Score: " + score);
      document.location.reload();
    }
  }
}

function drawRoad() {
  ctx.fillStyle = "#333";
  ctx.fillRect(0, 0, 400, 600);

  ctx.strokeStyle = "white";
  ctx.setLineDash([20, 20]);

  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * 60 + 30);
    ctx.lineTo(400, i * 60 + 30);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

function update() {
  ctx.clearRect(0, 0, 400, 600);

  drawRoad();
  drawChicken();
  drawCars();

  moveCars();
  checkCollision();

  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 10, 20);

  requestAnimationFrame(update);
}

setInterval(createCar, 1200);

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {
    chicken.y -= chicken.speed;
    score++;
  }
  if (e.key === "ArrowDown") chicken.y += chicken.speed;
  if (e.key === "ArrowLeft") chicken.x -= chicken.speed;
  if (e.key === "ArrowRight") chicken.x += chicken.speed;
});

update();
</script>

</body>
</html>
