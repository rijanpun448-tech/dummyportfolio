<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicken Road AAA 🐔</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  background: #111;
  font-family: Arial;
  overflow: hidden;
  text-align: center;
  color: white;
}

canvas {
  display: block;
  margin: auto;
  background: #222;
  border: 2px solid #444;
}

/* 🎮 joystick */
#joystick {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}

#stick {
  width: 50px;
  height: 50px;
  background: #ffcc00;
  border-radius: 50%;
  position: absolute;
  top: 35px;
  left: 35px;
}

/* UI */
#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  text-align: left;
}
</style>
</head>

<body>

<div id="ui">
  <div>🐔 Score: <span id="score">0</span></div>
  <div>❤️ Lives: <span id="lives">3</span></div>
  <div>🏆 Best: <span id="best">0</span></div>
</div>

<canvas id="game" width="360" height="600"></canvas>

<div id="joystick">
  <div id="stick"></div>
</div>

<!-- 🔊 sounds -->
<audio id="moveSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="crashSound" src="https://www.soundjay.com/transport/sounds/crash.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const moveSound = document.getElementById("moveSound");
const crashSound = document.getElementById("crashSound");

let score = 0;
let lives = 3;
let best = localStorage.getItem("best") || 0;

/* 🐔 animation frames */
const frames = [
  "https://cdn-icons-png.flaticon.com/512/616/616408.png",
  "https://cdn-icons-png.flaticon.com/512/616/616430.png",
  "https://cdn-icons-png.flaticon.com/512/616/616494.png"
];

let imgs = frames.map(src => {
  let i = new Image();
  i.src = src;
  return i;
});

let frame = 0;
let tick = 0;

/* 🚗 car */
const carImg = new Image();
carImg.src = "https://cdn-icons-png.flaticon.com/512/741/741407.png";

/* 🐔 player */
let chicken = {
  x: 160,
  y: 550,
  size: 40,
  speed: 25
};

let cars = [];

/* 🌙 day/night */
let dark = false;
setInterval(() => dark = !dark, 8000);

/* 🚗 spawn cars */
function spawnCar(){
  let lanes = [60,120,180,240,300,360,420,480];

  cars.push({
    x: Math.random()>0.5?-60:360,
    y: lanes[Math.floor(Math.random()*lanes.length)],
    w: 50,
    h: 35,
    speed: (Math.random()*2+2)*(Math.random()>0.5?1:-1)
  });
}

/* 🐔 draw chicken */
function drawChicken(){
  tick++;
  if(tick%8===0) frame = (frame+1)%imgs.length;
  ctx.drawImage(imgs[frame], chicken.x, chicken.y, chicken.size, chicken.size);
}

/* 🚗 draw cars */
function drawCars(){
  cars.forEach(c=>{
    ctx.drawImage(carImg,c.x,c.y,c.w,c.h);
  });
}

/* 🚗 move cars */
function moveCars(){
  cars.forEach(c=>c.x+=c.speed);
  cars = cars.filter(c=>c.x>-100 && c.x<420);
}

/* 💥 collision */
function checkCollision(){
  for(let c of cars){
    if(
      chicken.x < c.x+c.w &&
      chicken.x+chicken.size > c.x &&
      chicken.y < c.y+c.h &&
      chicken.y+chicken.size > c.y
    ){
      crashSound.play();
      lives--;
      chicken.x=160;
      chicken.y=550;

      if(lives<=0){
        gameOver();
      }
    }
  }
}

/* 🛣️ road */
function drawRoad(){
  ctx.fillStyle = dark ? "#000" : "#333";
  ctx.fillRect(0,0,360,600);

  ctx.strokeStyle = "#ffffff30";
  ctx.setLineDash([15,15]);

  for(let i=0;i<10;i++){
    ctx.beginPath();
    ctx.moveTo(0,i*60);
    ctx.lineTo(360,i*60);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

/* 🎮 movement */
function move(dir){
  moveSound.play();

  if(dir==="up"){ chicken.y-=chicken.speed; score++; }
  if(dir==="down") chicken.y+=chicken.speed;
  if(dir==="left") chicken.x-=chicken.speed;
  if(dir==="right") chicken.x+=chicken.speed;
}

/* 🏆 game over */
function gameOver(){
  if(score>best){
    localStorage.setItem("best",score);
  }
  alert("💀 Game Over!\nScore: "+score);
  location.reload();
}

/* 🔁 loop */
function update(){
  ctx.clearRect(0,0,360,600);

  drawRoad();
  drawChicken();
  drawCars();

  moveCars();
  checkCollision();

  document.getElementById("score").innerText=score;
  document.getElementById("lives").innerText=lives;
  document.getElementById("best").innerText=best;

  requestAnimationFrame(update);
}

setInterval(spawnCar,800);
update();

/* 🎮 joystick */
let stick = document.getElementById("stick");
let joy = document.getElementById("joystick");

let dragging=false;

joy.addEventListener("touchstart",()=>dragging=true);
joy.addEventListener("touchend",()=>{
  dragging=false;
  stick.style.left="35px";
  stick.style.top="35px";
});

joy.addEventListener("touchmove",(e)=>{
  if(!dragging) return;

  let t=e.touches[0];
  let rect=joy.getBoundingClientRect();

  let x=t.clientX-rect.left-60;
  let y=t.clientY-rect.top-60;

  stick.style.left=35+x*0.3+"px";
  stick.style.top=35+y*0.3+"px";

  if(Math.abs(x)>Math.abs(y)){
    move(x>0?"right":"left");
  }else{
    move(y>0?"down":"up");
  }
});
</script>

</body>
</html>
