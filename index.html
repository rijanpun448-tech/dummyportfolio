<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicken Road 🐔</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  body {
    margin: 0;
    background: #222;
    color: white;
    text-align: center;
    font-family: Arial;
    overflow: hidden;
  }

  canvas {
    display: block;
    margin: auto;
    background: #333;
  }

  #controls {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
  }

  .btn {
    width: 60px;
    height: 60px;
    background: #ffcc00;
    color: black;
    font-size: 24px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>

<body>

<h2>🐔 Chicken Road</h2>
<canvas id="game" width="360" height="600"></canvas>

<div id="controls">
  <div class="btn" onclick="move('left')">⬅️</div>
  <div class="btn" onclick="move('up')">⬆️</div>
  <div class="btn" onclick="move('down')">⬇️</div>
  <div class="btn" onclick="move('right')">➡️</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* 🐔 Chicken Image */
const chickenImg = new Image();
chickenImg.src = "https://i.imgur.com/4AiXzf8.png";

/* 🚗 Car Image */
const carImg = new Image();
carImg.src = "https://i.imgur.com/Z6X6K0P.png";

let chicken = {
  x: 160,
  y: 550,
  size: 40,
  speed: 25
};

let cars = [];
let score = 0;

function createCar() {
  let laneY = Math.floor(Math.random() * 10) * 60;
  cars.push({
    x: Math.random() > 0.5 ? -60 : 360,
    y: laneY,
    width: 60,
    height: 35,
    speed: (Math.random() * 3 + 2) * (Math.random() > 0.5 ? 1 : -1)
  });
}

function drawChicken() {
  ctx.drawImage(chickenImg, chicken.x, chicken.y, chicken.size, chicken.size);
}

function drawCars() {
  cars.forEach(car => {
    ctx.drawImage(carImg, car.x, car.y, car.width, car.height);
  });
}

function moveCars() {
  cars.forEach(car => car.x += car.speed);
  cars = cars.filter(car => car.x > -80 && car.x < 420);
}

function checkCollision() {
  for (let car of cars) {
    if (
      chicken.x < car.x + car.width &&
      chicken.x + chicken.size > car.x &&
      chicken.y < car.y + car.height &&
      chicken.y + chicken.size > car.y
    ) {
      alert("💀 Game Over! Score: " + score);
      location.reload();
    }
  }
}

function drawRoad() {
  ctx.fillStyle = "#2f2f2f";
  ctx.fillRect(0, 0, 360, 600);

  ctx.strokeStyle = "white";
  ctx.setLineDash([20, 20]);

  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * 60 + 30);
    ctx.lineTo(360, i * 60 + 30);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

function move(dir) {
  if (dir === "up") {
    chicken.y -= chicken.speed;
    score++;
  }
  if (dir === "down") chicken.y += chicken.speed;
  if (dir === "left") chicken.x -= chicken.speed;
  if (dir === "right") chicken.x += chicken.speed;
}

function update() {
  ctx.clearRect(0, 0, 360, 600);

  drawRoad();
  drawChicken();
  drawCars();
  moveCars();
  checkCollision();

  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 10, 20);

  requestAnimationFrame(update);
}

setInterval(createCar, 1000);
update();

/* 📱 Swipe Control */
let startX, startY;

canvas.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  let dy = e.changedTouches[0].clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) move("right");
    else move("left");
  } else {
    if (dy > 0) move("down");
    else move("up");
  }
});
</script>

</body>
</html>
