<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicken Road ULTRA AAA 🐔🔥</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial;
  color: white;
  text-align: center;
}

canvas {
  display: block;
  margin: auto;
  background: #1a1a1a;
}

/* UI */
#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 14px;
  text-align: left;
  z-index: 10;
}
</style>
</head>

<body>

<div id="ui">
🐔 Score: <span id="score">0</span><br>
🏆 Best: <span id="best">0</span><br>
❤️ Lives: <span id="lives">3</span><br>
⚡ Speed: <span id="speed">1x</span>
</div>

<canvas id="game" width="360" height="600"></canvas>

<audio id="hitSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"></audio>
<audio id="moveSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const hitSound = document.getElementById("hitSound");
const moveSound = document.getElementById("moveSound");

let score = 0;
let lives = 3;
let best = localStorage.getItem("best") || 0;
let speedMultiplier = 1;

/* 🐔 animated frames */
const frames = [
  "https://cdn-icons-png.flaticon.com/512/616/616408.png",
  "https://cdn-icons-png.flaticon.com/512/616/616430.png",
  "https://cdn-icons-png.flaticon.com/512/616/616494.png"
];

let imgs = frames.map(src => { let i=new Image(); i.src=src; return i; });

let chicken = { x:160, y:550, size:40, dir:"up" };
let frame=0, tick=0;

/* 🚗 AI cars */
const carImg = new Image();
carImg.src = "https://cdn-icons-png.flaticon.com/512/741/741407.png";

let cars = [];

/* 🌗 smooth day-night */
let light = 0;
let night = false;

/* particles */
let particles = [];

/* spawn cars smarter */
function spawnCar(){
  let lanes=[60,120,180,240,300,360,420,480];

  let density = Math.min(6, 1 + score/10);

  for(let i=0;i<density;i++){
    cars.push({
      x: Math.random()>0.5?-60:360,
      y: lanes[Math.floor(Math.random()*lanes.length)],
      w:50,
      h:35,
      sp:(Math.random()*2+2+score*0.02)*(Math.random()>0.5?1:-1)
    });
  }
}

/* 🐔 draw */
function drawChicken(){
  tick++;
  if(tick%6===0) frame=(frame+1)%imgs.length;

  ctx.drawImage(imgs[frame], chicken.x, chicken.y, chicken.size, chicken.size);
}

/* 🚗 cars */
function drawCars(){
  cars.forEach(c=>{
    ctx.drawImage(carImg,c.x,c.y,c.w,c.h);
  });
}

/* particles */
function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle="orange";
    ctx.fillRect(p.x,p.y,3,3);
  });
}

/* move */
function updateCars(){
  cars.forEach(c=>c.x+=c.sp);
  cars=cars.filter(c=>c.x>-120 && c.x<420);
}

/* 💥 particles on crash */
function explode(x,y){
  for(let i=0;i<20;i++){
    particles.push({
      x:x,
      y:y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:30
    });
  }
}

/* collision */
let invincible=0;

function check(){
  if(invincible>0) invincible--;

  for(let c of cars){
    if(
      chicken.x<c.x+c.w &&
      chicken.x+chicken.size>c.x &&
      chicken.y<c.y+c.h &&
      chicken.y+chicken.size>c.y
    ){
      if(invincible>0) return;

      hitSound.play();
      lives--;
      explode(chicken.x,chicken.y);
      invincible=60;

      chicken.x=160;
      chicken.y=550;

      if(lives<=0){
        if(score>best) localStorage.setItem("best",score);
        alert("💀 GAME OVER\nScore: "+score);
        location.reload();
      }
    }
  }
}

/* road + lighting */
function road(){
  light += night ? -0.01 : 0.01;
  light=Math.max(0,Math.min(1,light));

  if(light===1) night=true;
  if(light===0) night=false;

  let bg = Math.floor(40+light*100);

  ctx.fillStyle=`rgb(${bg},${bg},${bg})`;
  ctx.fillRect(0,0,360,600);

  ctx.strokeStyle="#ffffff30";
  ctx.setLineDash([15,15]);

  for(let i=0;i<10;i++){
    ctx.beginPath();
    ctx.moveTo(0,i*60);
    ctx.lineTo(360,i*60);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

/* movement */
function move(dir){
  moveSound.currentTime=0;
  moveSound.play();

  if(dir==="up"){ chicken.y-=30; score++; }
  if(dir==="down") chicken.y+=30;
  if(dir==="left") chicken.x-=30;
  if(dir==="right") chicken.x+=30;

  speedMultiplier = 1 + score*0.01;
}

/* update particles */
function updateParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });

  particles=particles.filter(p=>p.life>0);
}

/* loop */
function loop(){
  ctx.clearRect(0,0,360,600);

  road();
  drawCars();
  drawChicken();
  drawParticles();

  updateCars();
  updateParticles();
  check();

  document.getElementById("score").innerText=score;
  document.getElementById("lives").innerText=lives;
  document.getElementById("best").innerText=best;
  document.getElementById("speed").innerText=speedMultiplier.toFixed(1)+"x";

  requestAnimationFrame(loop);
}

/* spawn difficulty scaling */
setInterval(spawnCar, Math.max(300, 1000 - score*5));
loop();

/* swipe + keyboard */
let sx,sy;

canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?"right":"left");
  }else{
    move(dy>0?"down":"up");
  }
});

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp")move("up");
  if(e.key==="ArrowDown")move("down");
  if(e.key==="ArrowLeft")move("left");
  if(e.key==="ArrowRight")move("right");
});
</script>

</body>
</html>
